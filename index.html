<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YPT Premium Studio</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Animate.css for Premium Micro-Animations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- ApexCharts for Advanced Graphic Engine Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        body { background-color: #0b0b0d; font-family: 'Inter', sans-serif; }
        .premium-card { background: rgba(26, 26, 30, 0.65); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .subject-card.active-pulse { border-color: #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.25); animation: pulseBorder 2s infinite; }
        @keyframes pulseBorder { 0%, 100% { border-color: rgba(239, 68, 68, 0.4); } 50% { border-color: rgba(239, 68, 68, 1); } }
        /* Custom Scrollbar override */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0b0b0d; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 9px; }
    </style>
</head>
<body class="text-gray-100 min-h-screen pb-24">

    <!-- Premium Glow Header -->
    <header class="premium-card sticky top-0 z-50 px-4 py-3.5 border-b border-zinc-800/80 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-red-500 text-white p-1.5 rounded-lg animate__animated animate__pulse animate__infinite">
                <i class="fa-solid fa-fire-flame-curved text-sm"></i>
            </div>
            <h1 class="text-lg font-black tracking-tight text-white">YPT <span class="text-red-500 font-medium text-xs tracking-widest uppercase border border-red-500/30 px-1.5 py-0.5 rounded ml-1">PRO</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <span id="dday-display" class="bg-zinc-900 text-zinc-400 px-3 py-1 rounded-full text-xs font-semibold border border-zinc-800">D-Day: Unset</span>
            <span id="global-timer" class="text-base font-mono font-bold text-red-400 bg-red-950/30 px-3 py-1 rounded-full border border-red-900/40">Total: 00:00:00</span>
        </div>
    </header>

    <!-- Main Engine Deck -->
    <main class="max-w-md mx-auto p-4 space-y-6">

        <!-- ADVANCED TARGET DESK (D-DAY) -->
        <section class="premium-card p-4 rounded-2xl animate__animated animate__fadeInDown">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-bold text-zinc-500 tracking-wider uppercase">Milestone Engine</span>
                <button onclick="setDDay()" class="text-xs font-semibold text-red-400 hover:text-red-300 flex items-center gap-1 transition"><i class="fa-solid fa-pen-to-square"></i> Modify</button>
            </div>
            <div class="flex justify-between items-end">
                <div>
                    <h2 id="target-exam-name" class="text-base font-bold text-zinc-200">Set Core Exam Target</h2>
                    <p class="text-xs text-zinc-500">Days remaining countdown metrics</p>
                </div>
                <span id="target-days-left" class="text-3xl font-black text-white bg-gradient-to-r from-red-500 to-orange-500 bg-clip-text text-transparent">D-0</span>
            </div>
        </section>

        <!-- SUBJECT STOPWATCH CORE -->
        <section class="space-y-3">
            <div class="flex justify-between items-center px-1">
                <span class="text-xs font-bold text-zinc-500 tracking-wider uppercase">Focus Modules</span>
                <button onclick="addSubject()" class="bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-zinc-200 px-3 py-1 rounded-xl text-xs font-bold transition flex items-center gap-1"><i class="fa-solid fa-circle-plus text-red-400"></i> Add Module</button>
            </div>
            <div id="subjects-container" class="space-y-3"></div>
        </section>

        <!-- 10-MIN PLANNERS & TASKS -->
        <section class="premium-card p-4 rounded-2xl space-y-3">
            <span class="text-xs font-bold text-zinc-500 tracking-wider uppercase block">Premium Focus Tasks</span>
            <div class="flex gap-2">
                <input type="text" id="todo-input" placeholder="What will you conquer next?" class="flex-1 bg-zinc-900/90 border border-zinc-800 rounded-xl px-3.5 py-2 text-sm focus:outline-none focus:border-red-500 text-zinc-200 placeholder-zinc-600 transition">
                <button onclick="addTodo()" class="bg-red-500 hover:bg-red-600 text-white font-bold px-4 rounded-xl text-sm transition shadow-lg shadow-red-500/20"><i class="fa-solid fa-arrow-right"></i></button>
            </div>
            <ul id="todo-list" class="space-y-2 max-h-52 overflow-y-auto pr-1"></ul>
        </section>

        <!-- HIGH FIDELITY ANALYTICS DECK -->
        <section class="premium-card p-4 rounded-2xl space-y-2">
            <span class="text-xs font-bold text-zinc-500 tracking-wider uppercase block">Performance Metrics Engine</span>
            <div id="analytics-chart" class="w-full bg-zinc-900/40 rounded-xl border border-zinc-800/60 p-1"></div>
        </section>

    </main>

    <!-- Navigation Deck -->
    <nav class="fixed bottom-4 left-4 right-4 premium-card border border-zinc-800/60 p-2.5 rounded-2xl flex justify-around items-center max-w-md mx-auto shadow-2xl z-50">
        <button class="flex flex-col items-center text-red-500 transition"><i class="fa-solid fa-circle-dot text-lg"></i><span class="text-[10px] font-bold mt-1">Console</span></button>
        <button onclick="resetAllData()" class="flex flex-col items-center text-zinc-600 hover:text-red-400 transition"><i class="fa-solid fa-rotate-left text-lg"></i><span class="text-[10px] font-bold mt-1">Purge Cache</span></button>
    </nav>

    <script>
        // Internal Global State Register
        let state = {
            subjects: JSON.parse(localStorage.getItem('ypt_premium_subjects')) || [
                { id: 1, name: 'Mathematics Core', time: 0, color: '#3b82f6' },
                { id: 2, name: 'Advanced Physics', time: 0, color: '#a855f7' }
            ],
            todos: JSON.parse(localStorage.getItem('ypt_premium_todos')) || [],
            dday: JSON.parse(localStorage.getItem('ypt_premium_dday')) || { name: 'Final Exam', date: '' },
            history: JSON.parse(localStorage.getItem('ypt_premium_history')) || {},
            activeSubjectId: null
        };

        let activeTimerInterval = null;
        let apexChartInstance = null;

        function saveState() {
            localStorage.setItem('ypt_premium_subjects', JSON.stringify(state.subjects));
            localStorage.setItem('ypt_premium_todos', JSON.stringify(state.todos));
            localStorage.setItem('ypt_premium_dday', JSON.stringify(state.dday));
            localStorage.setItem('ypt_premium_history', JSON.stringify(state.history));
            updateGlobalMetrics();
        }

        function formatTime(secs) {
            const h = Math.floor(secs / 3600).toString().padStart(2, '0');
            const m = Math.floor((secs % 3600) / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        // Modular Timer Control System
        function toggleTimer(id) {
            const element = document.getElementById(`subject-${id}`);
            
            if (state.activeSubjectId === id) {
                // Trigger exit animation sequence execution
                element.classList.remove('active-pulse');
                clearInterval(activeTimerInterval);
                state.activeSubjectId = null;
                commitHistoryLog();
            } else {
                if (state.activeSubjectId !== null) {
                    document.getElementById(`subject-${state.activeSubjectId}`).classList.remove('active-pulse');
                    clearInterval(activeTimerInterval);
                    commitHistoryLog();
                }
                state.activeSubjectId = id;
                element.classList.add('active-pulse');
                
                activeTimerInterval = setInterval(() => {
                    const targetSub = state.subjects.find(s => s.id === id);
                    if (targetSub) {
                        targetSub.time++;
                        document.getElementById(`time-${id}`).innerText = formatTime(targetSub.time);
                        saveState();
                    }
                }, 1000);
            }
            renderSubjects();
        }

        function commitHistoryLog() {
            const todayKey = new Date().toISOString().split('T')[0];
            let aggregateTime = state.subjects.reduce((acc, c) => acc + c.time, 0);
            state.history[todayKey] = Math.round(aggregateTime / 60); // Log metric in minutes
            saveState();
            refreshAnalyticsChart();
        }

        // DOM Render Execution Layer
        function renderSubjects() {
            const container = document.getElementById('subjects-container');
            container.innerHTML = '';
            state.subjects.forEach(sub => {
                const isActive = state.activeSubjectId === sub.id;
                container.innerHTML += `
                    <div id="subject-${sub.id}" class="subject-card ${isActive ? 'active-pulse' : ''} premium-card p-4 rounded-2xl flex justify-between items-center transition-all duration-300 animate__animated animate__fadeInUp">
                        <div class="flex items-center gap-3">
                            <div class="w-3 h-3 rounded-full" style="background-color: ${sub.color}"></div>
                            <div>
                                <h4 class="font-bold text-sm tracking-wide text-zinc-100">${sub.name}</h4>
                                <span class="text-[11px] text-zinc-500 font-medium">Stopwatch Module Active</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-3.5">
                            <span id="time-${sub.id}" class="font-mono text-xl font-medium tracking-tight ${isActive ? 'text-red-400 font-bold' : 'text-zinc-400'}">${formatTime(sub.time)}</span>
                            <button onclick="toggleTimer(${sub.id})" class="w-11 h-11 rounded-xl flex items-center justify-center transition dynamic-action shadow-lg ${isActive ? 'bg-red-500 text-white shadow-red-500/20' : 'bg-zinc-800 text-zinc-300 hover:bg-zinc-700'}">
                                <i class="fa-solid ${isActive ? 'fa-pause' : 'fa-play'} text-sm"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function addSubject() {
            const name = prompt("Enter New Subject Title:");
            if (!name) return;
            const hexArray = ['#3b82f6', '#a855f7', '#10b981', '#f59e0b', '#ec4899', '#6366f1'];
            const assignedColor = hexArray[Math.floor(Math.random() * hexArray.length)];
            
            state.subjects.push({
                id: Date.now(),
                name: name,
                time: 0,
                color: assignedColor
            });
            saveState();
            renderSubjects();
        }

        // Tasks / To-Dos Layout Logic
        function renderTodos() {
            const list = document.getElementById('todo-list');
            list.innerHTML = '';
            state.todos.forEach((todo, index) => {
                list.innerHTML += `
                    <li class="flex justify-between items-center bg-zinc-900/60 px-3.5 py-2.5 rounded-xl border border-zinc-800/80 animate__animated animate__fadeIn text-sm">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${index})" class="w-4 h-4 accent-red-500 bg-zinc-800 border-zinc-700 rounded focus:ring-0">
                            <span class="${todo.completed ? 'line-through text-zinc-600' : 'text-zinc-300'} font-medium transition-all">${todo.text}</span>
                        </div>
                        <button onclick="deleteTodo(${index})" class="text-zinc-600 hover:text-red-400 transition"><i class="fa-solid fa-trash-can text-xs"></i></button>
                    </li>
                `;
            });
        }

        function addTodo() {
            const input = document.getElementById('todo-input');
            if (!input.value.trim()) return;
            state.todos.push({ text: input.value.trim(), completed: false });
            input.value = '';
            saveState();
            renderTodos();
        }

        function toggleTodo(index) {
            state.todos[index].completed = !state.todos[index].completed;
            saveState();
            renderTodos();
        }

        function deleteTodo(index) {
            state.todos.splice(index, 1);
            saveState();
            renderTodos();
        }

        // Milestone Engine Calculation Loop
        function setDDay() {
            const name = prompt("Enter Target Milestone Descriptor:", state.dday.name);
            const date = prompt("Enter Targeted Calendar Marker (YYYY-MM-DD):", state.dday.date);
            if (name && date) {
                state.dday = { name, date };
                saveState();
                calculateDDayMetric();
            }
        }

        function calculateDDayMetric() {
            if (!state.dday.date) return;
            const target = new Date(state.dday.date);
            const today = new Date();
            today.setHours(0,0,0,0);
            const calculationGap = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
            
            document.getElementById('target-exam-name').innerText = state.dday.name;
            const marker = document.getElementById('target-days-left');
            const headerMarker = document.getElementById('dday-display');
            
            if (calculationGap > 0) {
                marker.innerText = `D-${calculationGap}`;
                headerMarker.innerText = `D-${calculationGap}`;
            } else if (calculationGap === 0) {
                marker.innerText = "D-Day";
                headerMarker.innerText = "D-Day Now";
            } else {
                marker.innerText = "Passed";
                headerMarker.innerText = "Complete";
            }
        }

        // ApexCharts Vector Rendering Analytics Engine
        function refreshAnalyticsChart() {
            const generatedCategories = [];
            const absoluteSeriesData = [];
            
            for(let i = 6; i >= 0; i--) {
                const targetDay = new Date();
                targetDay.setDate(targetDay.getDate() - i);
                const stringFormat = targetDay.toISOString().split('T')[0];
                
                // Read date maps
                generatedCategories.push(targetDay.toLocaleDateString('en-US', { weekday: 'short' }));
                absoluteSeriesData.push(state.history[stringFormat] || 0); 
            }

            const configurations = {
                chart: { type: 'area', height: 160, toolbar: { show: false }, animations: { enabled: true, easing: 'easeinout', speed: 800 } },
                colors: ['#ef4444'],
                stroke: { width: 3, curve: 'smooth' },
                fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0.0, stops: [0, 90, 100] } },
                dataLabels: { enabled: false },
                grid: { show: true, borderColor: '#1f1f23', strokeDashArray: 4 },
                series: [{ name: 'Study Focus (Minutes)', data: absoluteSeriesData }],
                xaxis: { categories: generatedCategories, labels: { style: { colors: '#71717a', fontSize: '10px' } }, axisBorder: { show: false }, axisTicks: { show: false } },
                yaxis: { labels: { style: { colors: '#71717a', fontSize: '10px' } } },
                tooltip: { theme: 'dark' }
            };

            if (apexChartInstance) {
                apexChartInstance.updateOptions(configurations);
            } else {
                apexChartInstance = new ApexCharts(document.querySelector("#analytics-chart"), configurations);
                apexChartInstance.render();
            }
        }

        function updateGlobalMetrics() {
            const sumTotal = state.subjects.reduce((acc, c) => acc + c.time, 0);
            document.getElementById('global-timer').innerText = `Total: ${formatTime(sumTotal)}`;
        }

        function resetAllData() {
            if(confirm("Confirm action? This will clear local data logs completely.")) {
                localStorage.clear();
                location.reload();
            }
        }

        // System Core Init
        window.onload = function() {
            renderSubjects();
            renderTodos();
            calculateDDayMetric();
            updateGlobalMetrics();
            refreshAnalyticsChart();
        }
    </script>
</body>
</html>
